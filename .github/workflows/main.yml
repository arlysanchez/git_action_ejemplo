# .github/workflows/main.yml
# Pipeline CI/CD: SonarQube Analysis + Docker Deploy (Self-Hosted Runner)

name: CI/CD - SonarQube + Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecomapp'
  APP_CONTAINER_NAME: 'product_app'
  DB_CONTAINER_NAME: 'mysql-ecommerce-prod'
  DB_NAME: 'ecommerce_lp2_prod'
  DB_USER: 'root'
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:

  # JOB 1: Analisis SonarQube (primero)
  sonar-analysis:
    name: SonarQube Analysis and Quality Gate
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build proyecto sin tests
        run: mvn -B clean package -DskipTests

      - name: SonarQube Analysis
        timeout-minutes: 10
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.0.2155:sonar "-Dsonar.projectKey=ecommerce_git_action" "-Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}" "-Dsonar.login=${{ secrets.SONAR_TOKEN }}"

      - name: Quality Gate Check
        timeout-minutes: 10
        shell: pwsh
        run: |
          $token = "${{ secrets.SONAR_TOKEN }}"
          $hostUrl = "${{ secrets.SONAR_HOST_URL }}"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${token}:"))
          $headers = @{ Authorization = "Basic $base64" }

          # Buscar report-task.txt en todas las ubicaciones posibles
          $reportPath = ""
          $posiblesPaths = @(
            ".sonar\report-task.txt",
            "target\.sonar\report-task.txt",
            ".scannerwork\report-task.txt"
          )
          foreach ($path in $posiblesPaths) {
            if (Test-Path $path) {
              $reportPath = $path
              Write-Host "report-task.txt encontrado en: $path"
              break
            }
          }
          if ($reportPath -eq "") {
            Write-Host "Buscando report-task.txt en todo el proyecto..."
            $found = Get-ChildItem -Recurse -Filter "report-task.txt" -ErrorAction SilentlyContinue
            if ($found) {
              $reportPath = $found[0].FullName
              Write-Host "Encontrado en: $reportPath"
            } else {
              Write-Host "ERROR: report-task.txt no encontrado"
              exit 1
            }
          }

          # Leer taskId y projectKey desde el archivo
          Write-Host "=== Contenido de report-task.txt ==="
          Get-Content $reportPath | Write-Host

          $taskId = ""
          $projectKey = ""
          Get-Content $reportPath | ForEach-Object {
            if ($_ -match "^ceTaskId=(.+)$")   { $taskId = $matches[1] }
            if ($_ -match "^projectKey=(.+)$") { $projectKey = $matches[1] }
          }
          Write-Host "Task ID: $taskId"
          Write-Host "Project Key: $projectKey"

          # Esperar que SonarQube termine de procesar el task
          Write-Host "=== Esperando procesamiento en SonarQube ==="
          $taskStatus = ""
          $attempts = 0
          while ($taskStatus -ne "SUCCESS" -and $taskStatus -ne "FAILED" -and $taskStatus -ne "CANCELLED" -and $attempts -lt 20) {
            Start-Sleep -Seconds 10
            try {
              $taskResponse = Invoke-RestMethod -Uri "$hostUrl/api/ce/task?id=$taskId" -Headers $headers
              $taskStatus = $taskResponse.task.status
            } catch {
              Write-Host "Error consultando task: $_"
            }
            $attempts++
            Write-Host "Intento $attempts - Task status: $taskStatus"
          }

          if ($taskStatus -ne "SUCCESS") {
            Write-Host "El analisis no termino correctamente: $taskStatus"
            exit 1
          }

          # Consultar Quality Gate con el projectKey leido del archivo
          Write-Host "=== Consultando Quality Gate para: $projectKey ==="
          $qgResponse = Invoke-RestMethod -Uri "$hostUrl/api/qualitygates/project_status?projectKey=$projectKey" -Headers $headers
          $qgStatus = $qgResponse.projectStatus.status
          Write-Host "Quality Gate status: $qgStatus"

          if ($qgStatus -eq "OK") {
            Write-Host "=== Quality Gate PASSED - codigo aprobado ==="
          } else {
            Write-Host "=== Quality Gate FAILED - pipeline detenido ==="
            $qgResponse.projectStatus.conditions | ForEach-Object {
              if ($_.status -ne "OK") {
                Write-Host "Fallo: $($_.metricKey) - valor actual: $($_.actualValue) - umbral: $($_.errorThreshold)"
              }
            }
            exit 1
          }

  # JOB 2: Build + Docker Deploy (solo si Sonar pasa)
  build-and-deploy:
    name: Build and Docker Deploy
    runs-on: self-hosted
    needs: sonar-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn -B clean package -DskipTests

      - name: Deploy with Docker Compose
        shell: pwsh
        run: |
          Write-Host "=== Iniciando despliegue ==="
          Set-Location docker

          Write-Host "=== Limpiando despliegue anterior ==="
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} down -v --remove-orphans
          if ($LASTEXITCODE -ne 0) { Write-Host "No habia despliegue anterior." }

          Write-Host "=== Construyendo y levantando servicios ==="
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} up -d --build

          Write-Host "=== Esperando 30s para que la DB se estabilice ==="
          Start-Sleep -Seconds 30

          Write-Host "=== Inicializando base de datos ==="
          Get-Content ..\sql\init.sql | docker exec -i ${{ env.DB_CONTAINER_NAME }} mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} ${{ env.DB_NAME }}

          Write-Host "=== Verificando estructura de la base de datos ==="
          docker exec ${{ env.DB_CONTAINER_NAME }} mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} -e "USE ${{ env.DB_NAME }}; SHOW TABLES;"

          Write-Host "=== Esperando inicio de la aplicacion ==="
          Start-Sleep -Seconds 30

          Write-Host "=== Estado de los contenedores ==="
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} ps

          Write-Host "=== Ultimos logs de la app ==="
          docker logs --tail 200 ${{ env.APP_CONTAINER_NAME }}

          Write-Host "=== Despliegue completado exitosamente ==="
