# .github/workflows/main.yml
# 🚀 Pipeline CI/CD: SonarQube Analysis + Docker Deploy (Self-Hosted Runner)

name: CI/CD - SonarQube + Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecomapp'
  APP_CONTAINER_NAME: 'product_app'
  DB_CONTAINER_NAME: 'mysql-ecommerce-prod'
  DB_NAME: 'ecommerce_lp2_prod'
  DB_USER: 'root'
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Análisis SonarQube (primero)
  # ─────────────────────────────────────────────
  sonar-analysis:
    name: 📊 SonarQube Analysis & Quality Gate
    runs-on: self-hosted
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Compilar proyecto (sin tests)
        run: mvn -B clean package -DskipTests

      - name: 📊 SonarQube Analysis
        timeout-minutes: 10
        run: |
          echo "📊 === INICIO: ANÁLISIS DE CALIDAD ==="
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.0.2155:sonar "-Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}" "-Dsonar.token=${{ secrets.SONAR_TOKEN }}"
          echo "✅ === FIN: ANÁLISIS DE CALIDAD COMPLETADO ==="

      - name: 🎯 Quality Gate Check
        timeout-minutes: 10
        shell: pwsh
        run: |
          $status = ""
          $attempts = 0
          $maxAttempts = 20
          $token = "${{ secrets.SONAR_TOKEN }}"
          $hostUrl = "${{ secrets.SONAR_HOST_URL }}"
          $projectKey = "ecommerce_git_action"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${token}:"))

          while ($status -ne "OK" -and $status -ne "ERROR" -and $attempts -lt $maxAttempts) {
            Start-Sleep -Seconds 30
            $response = Invoke-RestMethod -Uri "$hostUrl/api/qualitygates/project_status?projectKey=$projectKey" `
              -Headers @{ Authorization = "Basic $base64" }
            $status = $response.projectStatus.status
            $attempts++
            Write-Host "⏳ Intento $attempts/$maxAttempts - Estado: $status"
          }

          if ($status -eq "OK") {
            Write-Host "✅ Quality Gate PASSED — el código cumple los estándares de calidad."
          } else {
            Write-Host "❌ Quality Gate FAILED — el pipeline se detiene."
            exit 1
          }

  # ─────────────────────────────────────────────
  # JOB 2: Build + Docker Deploy (solo si Sonar pasa)
  # ─────────────────────────────────────────────
  build-and-deploy:
    name: 🐳 Build & Docker Deploy
    runs-on: self-hosted
    needs: sonar-analysis
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build JAR with Maven
        run: mvn -B clean package -DskipTests

      - name: 🐳 Deploy with Docker Compose
        shell: pwsh
        run: |
          Write-Host "✅ Iniciando despliegue en el runner local..."
          Set-Location docker

          Write-Host "🧹 Limpiando despliegue anterior..."
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} down -v --remove-orphans
          if ($LASTEXITCODE -ne 0) { Write-Host "⚠️ No había despliegue anterior." }

          Write-Host "🏗️ Construyendo y levantando servicios..."
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} up -d --build

          Write-Host "⏳ Esperando 30s para que la DB se estabilice..."
          Start-Sleep -Seconds 30

          Write-Host "💾 Inicializando base de datos..."
          Get-Content ..\sql\init.sql | docker exec -i ${{ env.DB_CONTAINER_NAME }} mysql -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} ${{ env.DB_NAME }}

          Write-Host "🔍 Estado de los contenedores:"
          docker-compose -p ${{ env.DOCKER_PROJECT_NAME }} ps

          Write-Host "🗒️ Últimos logs de la app:"
          docker logs --tail 100 ${{ env.APP_CONTAINER_NAME }}

          Write-Host "🎉 ✓ Despliegue completado exitosamente."
